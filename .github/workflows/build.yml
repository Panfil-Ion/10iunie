name: Build check
on:
  push:
    branches: [main]

jobs:
  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install & build client
        working-directory: client
        run: |
          npm install --no-audit --no-fund
          node ../scripts/check-jsx-tags.mjs
          npm run build
      - name: Verify dist
        run: ls -la client/dist/
