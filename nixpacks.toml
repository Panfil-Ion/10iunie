# Fallback dacă Railway folosește Nixpacks în loc de Dockerfile
[variables]
NPM_CONFIG_PRODUCTION = "false"
NIXPACKS_NODE_VERSION = "20"

[phases.install]
cmds = [
  "npm install --prefix client --include=dev",
  "npm install --prefix server"
]

[phases.build]
cmds = ["npm run build --prefix client"]

[start]
cmd = "NODE_ENV=production node server/index.js"
